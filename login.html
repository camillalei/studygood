<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>英语学习</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #4A90D9 0%, #7C4DFF 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 40px 32px;
      width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo {
      text-align: center; margin-bottom: 32px;
    }
    .logo .emoji { font-size: 56px; line-height: 1; }
    .logo h1 {
      font-size: 20px; font-weight: 700; color: #333;
      margin-top: 12px;
    }
    .logo p { font-size: 13px; color: #aaa; margin-top: 4px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600;
      color: #555; margin-bottom: 6px;
    }
    .field input {
      width: 100%; height: 50px;
      border: 2px solid #eee; border-radius: 12px;
      padding: 0 16px; font-size: 16px; color: #333;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #4A90D9; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 48px; }
    .pw-eye {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      font-size: 20px; cursor: pointer; color: #aaa;
    }

    .btn-login {
      width: 100%; height: 52px; margin-top: 8px;
      background: linear-gradient(135deg, #4A90D9, #7C4DFF);
      color: white; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:active { opacity: 0.85; transform: scale(0.98); }

    .error-msg {
      text-align: center; color: #FF4757;
      font-size: 13px; font-weight: 600;
      margin-top: 14px; min-height: 18px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="emoji">📚</div>
    <h1>小学英语</h1>
    <p>广州版</p>
  </div>

  <div class="field">
    <label>账号</label>
    <input type="text" id="username" placeholder="请输入账号" autocomplete="username">
  </div>

  <div class="field">
    <label>密码</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
      <button class="pw-eye" onclick="togglePw()" tabindex="-1">👁</button>
    </div>
  </div>

  <button class="btn-login" onclick="doLogin()">进入学习</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
// ==============================
// 账号密码配置 — 修改这里
const CONFIG = {
  username: 'admin',
  password: '123456'
};
// ==============================

// 已登录则直接跳过登录页
if (localStorage.getItem('loggedIn') === 'true') {
  location.href = 'index.html';
}

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  if (u === CONFIG.username && p === CONFIG.password) {
    localStorage.setItem('loggedIn', 'true');
    location.href = 'index.html';
  } else {
    const msg = document.getElementById('errorMsg');
    msg.textContent = '账号或密码错误，请重试';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }
}

function togglePw() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
