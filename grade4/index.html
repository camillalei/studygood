<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>四年级下册英语</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="data/content.js?v=2"></script>
  <script>
    if (localStorage.getItem('loggedIn') !== 'true') {
      location.replace('../login.html');
    }
  </script>
  <style>
    .home-header {
      background: linear-gradient(135deg, #FF6B6B, #FF9F43);
    }
    .grade-switch-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.15); padding: 8px 16px;
      font-size: 13px; color: rgba(255,255,255,0.9);
    }
    .grade-switch-bar span { font-weight: 600; }
    .btn-switch-grade {
      background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4);
      color: white; border-radius: 20px; padding: 4px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="home-header">
  <div class="grade-switch-bar">
    <span>四年级下册</span>
    <button class="btn-switch-grade" onclick="location.href='../index.html'">切换年级 ›</button>
  </div>
  <h1>四年级下册英语</h1>
  <p>广州版 · 8个单元 · 共 <span id="totalWords">0</span> 个单词</p>
</div>

<div class="home-stats">
  <div class="stat-item">
    <div class="stat-num" id="learnedCount">0</div>
    <div class="stat-label">已掌握</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="wrongCount">0</div>
    <div class="stat-label">待复习</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="streakCount">0</div>
    <div class="stat-label">连续天数</div>
  </div>
</div>

<div class="section-title">学习模式</div>
<div class="mode-grid">
  <button class="mode-card" onclick="location.href='pages/flashcard.html'">
    <div class="icon">🃏</div>
    <div class="name">单词闪卡</div>
    <div class="desc">翻转记忆</div>
  </button>
  <button class="mode-card" onclick="location.href='pages/spell.html'">
    <div class="icon">✏️</div>
    <div class="name">拼写测试</div>
    <div class="desc">看中文写英文</div>
  </button>
  <button class="mode-card" onclick="location.href='pages/dictation.html'">
    <div class="icon">🎧</div>
    <div class="name">听写练习</div>
    <div class="desc">听音写单词</div>
  </button>
  <button class="mode-card" onclick="location.href='pages/sentences.html'">
    <div class="icon">💬</div>
    <div class="name">句型学习</div>
    <div class="desc">短语·句式</div>
  </button>
</div>

<div class="mode-grid" style="padding-top:0">
  <button class="mode-card" onclick="location.href='pages/review.html'" style="grid-column: 1/-1">
    <div class="icon">📝</div>
    <div class="name">错题本</div>
    <div class="desc">专项复习做错的单词</div>
  </button>
</div>

<div class="section-title">选择单元</div>
<div class="unit-list" id="unitList"></div>

<script>
const STORAGE_KEY = 'progress_grade4';

async function init() {
  const data = window.ENGLISH_DATA;
  localStorage.setItem('englishData', JSON.stringify(data));

  const allWords = data.units.flatMap(u => u.vocabulary).concat(data.review.vocabulary);
  document.getElementById('totalWords').textContent = allWords.length;

  const progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const learned = Object.values(progress).filter(v => v >= 3).length;
  const wrong = Object.values(progress).filter(v => v < 0).length;

  document.getElementById('learnedCount').textContent = learned;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('streakCount').textContent = getStreak();

  const list = document.getElementById('unitList');
  data.units.forEach(unit => {
    const total = unit.vocabulary.length;
    const done = unit.vocabulary.filter(v => (progress[v.word] || 0) >= 3).length;
    const pct = total ? Math.round(done / total * 100) : 0;

    const el = document.createElement('button');
    el.className = 'unit-card';
    el.onclick = () => location.href = `pages/unit.html?id=${unit.id}`;
    el.innerHTML = `
      <div class="unit-badge" style="background:${unit.color}">${unit.id}</div>
      <div class="unit-info">
        <div class="title">${unit.title}</div>
        <div class="sub">${unit.theme} · ${total}个单词</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${unit.color}"></div></div>
      </div>
      <div class="unit-arrow">›</div>
    `;
    list.appendChild(el);
  });

  const rev = data.review;
  const total = rev.vocabulary.length;
  const done = rev.vocabulary.filter(v => (progress[v.word] || 0) >= 3).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const el = document.createElement('button');
  el.className = 'unit-card';
  el.onclick = () => location.href = `pages/unit.html?id=review`;
  el.innerHTML = `
    <div class="unit-badge" style="background:${rev.color}">R</div>
    <div class="unit-info">
      <div class="title">${rev.title}</div>
      <div class="sub">${rev.theme} · ${total}个单词</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${rev.color}"></div></div>
    </div>
    <div class="unit-arrow">›</div>
  `;
  list.appendChild(el);
}

function getStreak() {
  const today = new Date().toDateString();
  const days = JSON.parse(localStorage.getItem('studyDays_grade4') || '[]');
  if (!days.includes(today)) {
    days.push(today);
    localStorage.setItem('studyDays_grade4', JSON.stringify(days));
  }
  let streak = 0;
  let d = new Date();
  while (true) {
    if (days.includes(d.toDateString())) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

init();
</script>
</body>
</html>
